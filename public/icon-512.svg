  <line x1="337" y1="285" x2="432" y2="270" stroke="#E8C4B8" stroke-width="4" stroke-linecap="round"/>
  <line x1="337" y1="305" x2="432" y2="305" stroke="#E8C4B8" stroke-width="4" stroke-linecap="round"/>
